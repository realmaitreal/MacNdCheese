name: Build MacNCheese DMGs

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Apple Silicon
            runner: macos-14
            arch_name: silicon
          - name: Intel
            runner: macos-13
            arch_name: intel

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Make build script executable
        run: chmod +x scripts/build_dmg.sh

      - name: Build app and DMG
        run: ./scripts/build_dmg.sh "${{ matrix.arch_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MacNCheese-${{ matrix.arch_name }}-dmg
          path: MacNCheese-${{ matrix.arch_name }}.dmg
          retention-days: 7

  release:
    name: Publish Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Download silicon artifact
        uses: actions/download-artifact@v4
        with:
          name: MacNCheese-silicon-dmg
          path: artifacts/silicon

      - name: Download intel artifact
        uses: actions/download-artifact@v4
        with:
          name: MacNCheese-intel-dmg
          path: artifacts/intel

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/silicon/MacNCheese-silicon.dmg
            artifacts/intel/MacNCheese-intel.dmg
          generate_release_notes: true
