name: Build MacNCheese DMG (Intel)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build Intel (x86_64)
    runs-on: macos-latest  # Apple Silicon runner

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure Rosetta 2
        run: sudo softwareupdate --install-rosetta --agree-to-license

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Make build script executable
        run: chmod +x scripts/build_dmg.sh

      - name: Build Intel DMG
        run: |
          arch -x86_64 .github/workflows/release.yml intel

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MacNCheese-intel-dmg
          path: MacNCheese-intel.dmg
          retention-days: 7

  release:
    name: Publish Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: MacNCheese-intel-dmg
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/MacNCheese-intel.dmg
          generate_release_notes: true
